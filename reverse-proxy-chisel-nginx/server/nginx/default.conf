# Этот файл подключается внутри http{} в стандартном nginx.conf контейнера nginx.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 4015;
    server_name _;

    # Увеличенные таймауты полезны для Dash/долгих запросов.
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;

    location / {
        # Внутренний порт chisel-контейнера. Наружу он НЕ публикуется.
        # Локальный клиент поднимет reverse-проброс:
        # R:0.0.0.0:18050:127.0.0.1:8050
        proxy_pass http://chisel:18050;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 4015;

        # На случай если через этот же location пойдут upgrade-запросы.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Нужно, чтобы sub_filter мог менять HTML/JS, а не получал gzip от upstream.
        proxy_set_header Accept-Encoding "";

        # Фронтенд был замечен с попыткой ws://SERVER:8765/.
        # Порт 8765 на белом сервере недоступен, поэтому переписываем на 4014.
        sub_filter_once off;
        sub_filter_types text/html application/javascript text/javascript application/json;
        sub_filter ':8765' ':4014';
    }
}
